name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: ./.github/actions/rustup
        with:
          fmt: true
          restore-cache: false

      - run: cargo fmt --all -- --check

  typos:
    name: Spell Check
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: crate-ci/typos@v1.44.0
        with:
          files: .

  deny:
    name: Cargo Deny
    needs: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'Cargo.lock'

      - name: Install cargo-deny
        if: steps.filter.outputs.src == 'true'
        uses: taiki-e/install-action@cargo-deny

      - if: steps.filter.outputs.src == 'true'
        run: cargo deny check

  test:
    name: Lint and Test
    needs: deny
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          clippy: true
          save-cache: ${{ github.ref_name == 'main' }}

      - name: Install pnpm (for compatibility check)
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3
          run_install: false
          standalone: true

      - name: Cache pnpm
        uses: actions/cache@v5
        with:
          key: ci-pnpm-${{ matrix.os }}
          path: |
            ${{ env.PNPM_HOME }}/store/v3
            ${{ env.HOME }}/.local/share/pnpm/store/v3
        timeout-minutes: 1
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just install

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Test
        shell: bash
        run: |
          just registry-mock launch

          # removing env vars is a temporary workaround for unit tests in pacquet relying on external environment
          # this should be removed in the future
          unset PNPM_HOME
          unset XDG_DATA_HOME

          # Print full test output including stderr on failure for debugging.
          # TRACE is NOT set globally because it would leak into sub-process
          # pacquet invocations and break --reporter=silent tests.
          just test

          just registry-mock end

      - name: Build pacquet binary
        run: cargo build --locked --release -p pacquet-cli --bin pacquet

      - name: Upload pacquet artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: pacquet-${{ matrix.os }}
          path: target/release/pacquet
          if-no-files-found: error

      - name: Upload pacquet artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: pacquet-${{ matrix.os }}
          path: target/release/pacquet.exe
          if-no-files-found: error

  benchmark:
    name: Benchmark (pacquet vs pnpm)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3
          run_install: false
          standalone: true

      - name: Install tools
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just install

      - name: Install hyperfine
        uses: ./.github/actions/binstall
        with:
          packages: hyperfine@1.18.0

      - name: Build benchmark executor
        run: cargo build --bin=integrated-benchmark

      - name: Run micro-benchmarks
        run: cargo run --release --bin=micro-benchmark

      - name: 'Benchmark: Frozen Lockfile (pacquet vs pnpm)'
        shell: bash
        run: |
          just registry-mock launch
          just integrated-benchmark --scenario=frozen-lockfile --verdaccio --with-pnpm HEAD
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/FROZEN_LOCKFILE.md
          just registry-mock end

      - name: 'Benchmark: Warm Install / Noop (pacquet vs pnpm)'
        shell: bash
        run: |
          just registry-mock launch
          just integrated-benchmark --scenario=warm-install --verdaccio --with-pnpm HEAD
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/WARM_INSTALL.md
          just registry-mock end

      - name: Print benchmark results
        shell: bash
        run: |
          echo '## Benchmark Results'
          echo
          echo '### Frozen Lockfile (pacquet vs pnpm)'
          cat bench-work-env/FROZEN_LOCKFILE.md
          echo
          echo '### Warm Install / Noop (pacquet vs pnpm)'
          cat bench-work-env/WARM_INSTALL.md
