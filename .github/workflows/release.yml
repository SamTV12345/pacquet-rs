name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pacquet-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: pacquet-linux-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: pacquet-linux-x64-musl

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pacquet-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pacquet-darwin-arm64

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pacquet-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: pacquet-win32-arm64

    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cross build -p pacquet-cli --bin pacquet --release --target=${{ matrix.target }}

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/pacquet.exe ${{ matrix.artifact }}.exe
          7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}.exe

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/pacquet ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sha256sum ${{ matrix.artifact }}.zip > ${{ matrix.artifact }}.zip.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.tar.gz
            *.sha256

  upload:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: false
